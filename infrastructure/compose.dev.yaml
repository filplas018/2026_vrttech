services:
  web:
    build:
      target: development
    volumes:
      - ../server:/app
    ports:
      - "8000:8000"

  client:
    build:
      target: development
    volumes:
      - ../client:/app
      - client_node_modules:/app/node_modules
    ports:
      - "5173:5173"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  db:
    ports:
      - "5432:5432"

volumes:
  client_node_modules:
  caddy_data:
  caddy_config:
